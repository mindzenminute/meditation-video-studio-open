name: Render

on:
  workflow_dispatch:
    inputs:
      inputPath:
        description: 'Chemin du fichier JSON n8n/RAG à utiliser'
        required: false
        default: 'src/data/example-input.json'

jobs:
  render:
    name: Render video
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Ensure Remotion browser
        run: npx remotion browser ensure

      - name: Ingest input JSON
        run: npm run ingest -- ${{ inputs.inputPath }}

      - name: Render with Remotion
        run: npm run render -- --props=public/output/render-props.json

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: meditation-video
          path: public/output/meditation.mp4
